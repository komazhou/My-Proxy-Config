STD_AI池 = url-test,STD_AI节点,REJECT,interval=60,tolerance=50
VIP全局 = url-test,VIP节点,REJECT,interval=60,tolerance=50
STD全局 = url-test,STD节点,REJECT,interval=60,tolerance=50
LOW兜底测速 = url-test,LOW节点,REJECT,interval=60,tolerance=50
我的VPS = select,VPS节点,REJECT

