# 第二层：顶层 Failover / Fallback 业务链
AI服务链 = fallback,我的VPS,VIP_AI池,STD_AI池,VIP全局,interval=60,max-timeout=2000
影音搜索链 = fallback,STD全局,VIP全局,我的VPS,LOW兜底测速,interval=60,max-timeout=2000
漏网兜底链 = fallback,STD全局,VIP全局,LOW兜底测速,我的VPS,interval=60,max-timeout=2000

# --------------------------------
# 第一层：分级自动测速池 (URL-Test) 与区域测速池
