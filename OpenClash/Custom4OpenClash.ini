;================================================================
;  OpenClash 订阅转换规则模板（全分组 + 中文注释版）
;================================================================
;
;  基于 Aethersailor/Custom_OpenClash_Rules 模板二次定制
;  参考 usbog232/clashmetadingyue 模板优化
;
;  原始项目：https://github.com/Aethersailor/Custom_OpenClash_Rules
;  配套教程：https://github.com/Aethersailor/Custom_OpenClash_Rules/wiki
;
;================================================================
;                 ┌ 模板架构概览 ┐
;================================================================
;
;  本模板采用"三层 fallback"分流架构：
;
;  ┌────────────────────────────────────────────────────┐
;  │ 第一层：分级节点池                                 │
;  │   按订阅等级（VPS/VIP/STD/LOW）分池，url-test      │
;  │   自动测速选出每个等级的最优节点                    │
;  ├────────────────────────────────────────────────────┤
;  │ 第二层：顶层 fallback 业务组                       │
;  │   对节点池进行 fallback（自动容灾切换），例如：     │
;  │   · AI服务 → VPS→VIP-AI→STD-AI→VIP全局             │
;  │   · 影音搜索 → STD→VIP→VPS→LOW                     │
;  ├────────────────────────────────────────────────────┤
;  │ 第三层：功能分组                                   │
;  │   各应用/服务的 select 分组，首选项指向业务组或     │
;  │   地区节点组，可手动切换                            │
;  └────────────────────────────────────────────────────┘
;
;  配合底部的地区节点组（url-test 按地区自动测速）
;  实现：自动测速 + 自动容灾 + 手动微调 的三重保障
;
;================================================================
;              ┌ DNS 泄露防护说明（重要）┐
;================================================================
;
;  ▍什么是 DNS 泄露？
;  DNS 泄露是指你的 DNS 查询请求绕过代理通道，直接发送到
;  本地 ISP 的 DNS 服务器，导致 ISP 可以看到你在访问哪些
;  域名，即使你的数据流量本身走了代理。
;
;  ▍本模板如何防 DNS 泄露？
;
;  1. 【规则全覆盖】
;     所有已知需要代理的域名/IP，都通过 GEOSITE / GEOIP
;     规则精确匹配并指向代理分组，DNS 查询在代理端完成。
;
;  2. 【GEOIP 使用 no-resolve】
;     所有 GEOIP 规则都附加 no-resolve 参数，这意味着：
;     当仅需根据 IP 判断分流时，不会触发本地 DNS 解析，
;     避免在 DNS 阶段就暴露你的访问意图。
;
;  3. 【国内域名/IP 兜底直连】
;     GEOSITE,cn + GEOIP,cn 作为兜底规则，确保国内
;     域名走直连。国内域名的 DNS 解析走本地是正常行为，
;     不算泄露。
;
;  4. 【漏网之鱼策略说明】
;     · 漏网之鱼设为"代理"：所有未命中规则的域名走代理，
;       DNS 在远端解析 → DNS 泄露测试 100% 通过
;     · 漏网之鱼设为"直连"（本模板默认）：未命中的域名
;       走直连，本地解析 DNS → DNS 泄露测试可能不通过，
;       但因为需代理的域名已被规则覆盖，实际不存在泄露。
;       好处是减少代理流量和延迟。
;     · 如需通过 DNS 泄露测试，可在面板手动切为代理分组
;
;  5. 【配合 OpenClash 设置建议】
;     · 建议使用 fake-ip 增强模式（Meta 内核）
;     · 禁用 IPv6（防止 IPv6 流量绕过代理泄露）
;     · 阻断 QUIC/UDP 443（防止 HTTP/3 绕过代理）
;     · 使用 DoH/DoT 上游 DNS（防止 DNS 明文传输）
;
;================================================================

[custom]

;================================================================
; ▌ 节点清洗（自动过滤无效节点）
;================================================================
; 机场订阅中常包含"流量提示""到期时间""官网地址"等非节点信息，
; 这些会以节点形式出现在列表中但无法使用。
; 下方正则会自动将名称匹配到的节点剔除，保持列表干净。
; ⚠️ 如果你的真实节点名确实包含这些关键词，请从此处删除对应关键词。
;================================================================
exclude=流量|套餐|到期|剩余|重置|官网|网站|最新网址|防失联|失联|官网地址|公告|通知|TG|Telegram|电报|群|频道|说明|使用说明|QQ群|客服|工单|订阅|Expire|Traffic|Reset|Remaining|Official|Website

;================================================================
; ▌ 规则段（ruleset）— 分流规则定义
;================================================================
;
; 【核心原理】
; 规则按照从上到下的顺序逐条遍历，一旦命中就停止匹配。
; 因此排列顺序至关重要！
;
;   优先级从高到低：
;   私网直连 → 自定义补丁 → 国内可用 → 大流量云盘 →
;   应用规则 → GFW兜底 → GEOIP补充 → 国内兜底 →
;   非标端口 → 漏网之鱼(FINAL)
;
; 【规则数据源说明】
; · []GEOSITE,xxx  → 基于域名的规则集（内置于 Clash 内核）
; · []GEOIP,xxx    → 基于 IP 的规则集（内置于 Clash 内核）
; · clash-classic:URL → 从远程 URL 拉取的 Clash 规则文件
; · no-resolve    → 不触发本地 DNS 解析（防 DNS 泄露关键参数）
; · ,28800        → 规则文件缓存时间（秒），28800 = 8小时
;
;================================================================

; ------ ① 私网/本地地址直连 ------
; 内网 IP（192.168.x.x / 10.x.x.x 等）、私有域名，
; 确保局域网设备通信不走代理
ruleset=🎯 全球直连,[]GEOSITE,private
ruleset=🎯 全球直连,[]GEOIP,private,no-resolve

; ------ ② 自定义直连/代理补丁 ------
; Aethersailor 项目维护的补充规则，用于修正 GEOSITE 未覆盖的域名
; 直连补丁：修正某些被误判为需代理但实际可直连的域名
ruleset=🎯 全球直连,clash-classic:https://testingcf.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Custom_Direct_Classical.yaml,28800
; 代理补丁：修正某些未被 GFW 规则覆盖但确实需要代理的域名
ruleset=🚀 手动选择,clash-classic:https://testingcf.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Custom_Proxy_Classical.yaml,28800

; ------ ③ 国内可用域名直连 ------
; 以下域名虽属于国外服务商但在国内可正常访问，直连可提速
; 谷歌在国内可用的服务（如 Google 翻译 API、reCAPTCHA 等）
ruleset=🎯 全球直连,[]GEOSITE,google-cn
; 国内版游戏域名（如原神国服等）
ruleset=🎯 全球直连,[]GEOSITE,category-games@cn
; Steam 下载 CDN（国内有 CDN 加速，直连速度更快）
ruleset=🎯 全球直连,clash-classic:https://testingcf.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Steam_CDN_Classical.yaml,28800
; 各大游戏平台的下载域名（Epic/EA/Blizzard 等下载服务器）
ruleset=🎯 全球直连,[]GEOSITE,category-game-platforms-download
; BT Tracker 公共域名（走直连提升 P2P 连接性）
ruleset=🎯 全球直连,[]GEOSITE,category-public-tracker

; ------ ④ 大流量云盘区 ------
; ⚠️ 必须放在谷歌/微软/苹果规则之前！
; 原因：Google Drive 属于 google GEOSITE，OneDrive 属于 microsoft GEOSITE，
; 如果放在后面，云盘流量会被谷歌/微软规则抢走，无法单独控制走哪个节点池。
; 云盘传输大文件时选择流量优先的节点池可以节省成本。
ruleset=📺 影音搜索,[]GEOSITE,dropbox
ruleset=📺 影音搜索,clash-classic:https://testingcf.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/GoogleDrive/GoogleDrive.yaml,28800
ruleset=📺 影音搜索,clash-classic:https://testingcf.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/OneDrive/OneDrive.yaml,28800

; ------ ⑤ 即时通讯与社交媒体 ------
; 即时通讯包含 Telegram/WhatsApp/Line/Signal 等海外主流聊天软件
ruleset=💬 即时通讯,[]GEOSITE,category-communication
; 社交媒体包含 Twitter(X)/Facebook/Instagram/Reddit 等（排除国内社交平台）
ruleset=🌐 社交媒体,[]GEOSITE,category-social-media-!cn

; ------ ⑥ AI 服务 ------
; OpenAI（ChatGPT/GPT-4/DALL·E/Sora 等）单独匹配
ruleset=🤖 AI服务,[]GEOSITE,openai
; Bing/Copilot 单独分组（可切换走 AI 链或影音链）
ruleset=🤖 Copilot,[]GEOSITE,bing
; 其他 AI 服务（Claude/Gemini/Midjourney 等，排除国内 AI）
ruleset=🤖 AI服务,[]GEOSITE,category-ai-!cn

; ------ ⑦ 开发工具 ------
ruleset=🚀 GitHub,[]GEOSITE,github
; 测速工具（SpeedTest/Fast.com 等）
ruleset=🚀 测速工具,[]GEOSITE,category-speedtest

; ------ ⑧ 游戏平台 ------
; Steam 商店/社区（注意：Steam 下载 CDN 已在上方 ③ 直连）
ruleset=🎮 Steam,[]GEOSITE,steam

; ------ ⑨ 流媒体服务 ------
ruleset=📹 YouTube,[]GEOSITE,youtube
; AppleTV+ 必须在 Apple 大类之前，否则会被苹果规则抢走
ruleset=🎥 AppleTV+,[]GEOSITE,apple-tvplus
ruleset=🎶 TikTok,[]GEOSITE,tiktok
ruleset=🎥 Netflix,[]GEOSITE,netflix
ruleset=🎥 DisneyPlus,[]GEOSITE,disney
ruleset=🎥 HBO,[]GEOSITE,hbo
ruleset=🎥 PrimeVideo,[]GEOSITE,primevideo
; Emby 第三方媒体服务器
ruleset=🎥 Emby,[]GEOSITE,category-emby
ruleset=🎻 Spotify,[]GEOSITE,spotify
; Bahamut 动画疯（台湾动画串流平台，通常需要台湾节点）
ruleset=📺 Bahamut,[]GEOSITE,bahamut

; ------ ⑩ 苹果/微软/Cloudflare/谷歌 ------
; ⚠️ 放在流媒体之后，因为 AppleTV+ 等已在上方 ⑨ 精确匹配
ruleset=🍎 苹果服务,[]GEOSITE,apple
ruleset=Ⓜ️ 微软服务,[]GEOSITE,microsoft
; Cloudflare：大量网站使用 CF CDN，单独分流可精细控制
ruleset=☁️ Cloudflare,[]GEOSITE,cloudflare
; 谷歌 FCM 推送服务（安卓设备消息推送，可能需要低延迟节点）
ruleset=📢 谷歌FCM,[]GEOSITE,googlefcm
; 谷歌服务兜底（搜索/地图/Gmail 等所有谷歌域名）
ruleset=🇬 谷歌服务,[]GEOSITE,google

; ------ ⑪ 综合分类 ------
; 海外游戏平台兜底（Epic/EA/Blizzard/Xbox 等）
ruleset=🎮 游戏平台,[]GEOSITE,category-games
; 海外娱乐网站
ruleset=🌎 国外媒体,[]GEOSITE,category-entertainment
; 海外电商（Amazon/eBay 等）
ruleset=🛒 国外电商,[]GEOSITE,category-ecommerce

; ------ ⑫ GFW 兜底 ------
; 已知被 GFW 封锁的域名，确保这些域名走代理
; 作为"安全网"，捕获上方未被具体应用规则命中的被墙域名
ruleset=🚀 手动选择,[]GEOSITE,gfw

; ------ ⑬ GEOIP 补充匹配 ------
; GEOSITE 是基于域名匹配，GEOIP 是基于 IP 匹配
; 某些服务可能使用未被 GEOSITE 收录的域名，但 IP 段是已知的
; 通过 GEOIP 作为补充，提高规则覆盖率
;
; ⚠️ no-resolve → 不触发本地 DNS 解析，防止 DNS 泄露！
; 原理：如果没有 no-resolve，Clash 会先做本地 DNS 解析获取 IP，
;        然后用 IP 去匹配 GEOIP 规则。这个本地 DNS 解析就可能泄露。
;        加上 no-resolve 后，仅在已有 IP 信息时才匹配，无 IP 则跳过。
ruleset=💬 即时通讯,[]GEOIP,telegram,no-resolve
ruleset=🌐 社交媒体,[]GEOIP,twitter,no-resolve
ruleset=🌐 社交媒体,[]GEOIP,facebook,no-resolve
ruleset=🇬 谷歌服务,[]GEOIP,google,no-resolve
ruleset=🎥 Netflix,[]GEOIP,netflix,no-resolve

; ------ ⑭ 国内域名/IP 兜底直连 ------
; ⚠️ 这是防 DNS 泄露的关键规则之一！
; 将所有国内域名和 IP 直连，确保不浪费代理流量
; 同时也是"白名单模式"的核心：先匹配国外规则走代理，最后国内兜底直连
;
; GEOSITE,cn → 国内域名（如 baidu.com, taobao.com 等）
; GEOIP,cn   → 国内 IP 段（解析后 IP 属于中国大陆的直连）
; 由于 OpenClash 的大陆白名单可能收录不全，这两条作为安全兜底
ruleset=🎯 全球直连,[]GEOSITE,cn
ruleset=🎯 全球直连,[]GEOIP,cn,no-resolve

; ------ ⑮ 非标端口（PT/BT 优化）------
; 将 80/443 以外端口的流量归类到非标端口分组
; 大部分正常网页流量都走 80(HTTP)/443(HTTPS) 端口
; 非标准端口的流量通常是 P2P、游戏、内网应用等，直连更合适
ruleset=🔀 非标端口,clash-classic:https://testingcf.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Custom_Port_Direct.yaml,28800

; ------ ⑯ 漏网之鱼（最终兜底）------
; 所有未被上方规则命中的流量都会来到这里
; FINAL 是 Clash 内置的最终兜底规则
;
; 【DNS 泄露与漏网之鱼的关系】
; · 本模板漏网之鱼默认选"直连"：未知域名直连，减少代理流量
;   DNS 泄露测试可能不通过，但实际不存在泄露（需代理的域名已全覆盖）
; · 如需通过 DNS 泄露测试，可手动切换为代理分组（STD/VIP/LOW/VPS）
; · 建议配合 fake-ip 模式使用，可进一步降低泄露风险
ruleset=🐟 漏网之鱼,[]FINAL

; ▌ 规则段结束
;================================================================


;================================================================
; ▌ 节点分组段（custom_proxy_group）
;================================================================
;
; 【三层 fallback 架构详解】
;
; ┌─ 第一层：分级节点池（url-test 自动测速）─────────────────┐
; │                                                          │
; │  你的订阅节点按等级（VPS/VIP/STD/LOW）筛选分池：         │
; │  · 🏠 我的VPS   → 自建节点（select 手动选择）            │
; │  · 🤖 VIP-AI池  → VIP 中美/日/新/台（自动测速）          │
; │  · 🤖 STD-AI池  → STD 中美/日/新/台（自动测速）          │
; │  · 🌟 VIP全局   → 所有 VIP 节点（自动测速）              │
; │  · 🌍 STD全局   → 所有 STD 节点（自动测速）              │
; │  · ♻️ LOW兜底   → 所有 LOW 节点（自动测速）              │
; │                                                          │
; │  url-test 参数说明：                                     │
; │  · 测速 URL: gstatic.com/generate_204                    │
; │  · 测速间隔: 300 秒（5 分钟）                            │
; │  · 容差: 50ms（延迟差在 50ms 内不切换，避免频繁跳动）    │
; │  · []REJECT 尾部 → 无匹配节点时拒绝（而非意外直连）      │
; └──────────────────────────────────────────────────────────┘
;
; ┌─ 第二层：fallback 业务组（自动容灾切换）─────────────────┐
; │                                                          │
; │  对第一层的节点池做 fallback 级联：                       │
; │  依次尝试每个节点池，第一个可用的池会被选中               │
; │  当首选池挂了会自动切换到下一个池                         │
; │                                                          │
; │  · 🤖 AI服务：VPS→VIP-AI→STD-AI→VIP全局                 │
; │    （AI 服务对 IP 质量要求最高，VPS 最优）                │
; │                                                          │
; │  · 📺 影音搜索：STD→VIP→VPS→LOW                         │
; │    （流媒体/大流量场景，流量成本优先）                    │
; └──────────────────────────────────────────────────────────┘
;
; ┌─ 第三层：功能分组（select 手动选择）─────────────────────┐
; │                                                          │
; │  各应用/服务的分流出口，首选项通常指向业务组或地区组      │
; │  可随时在 OpenClash 面板中手动切换到不同的地区节点        │
; └──────────────────────────────────────────────────────────┘


; ====== 第一层：分级节点池 ======

; 自建 VPS 节点（select → 手动选择具体 VPS 节点）
custom_proxy_group=🏠 我的VPS`select`VPS`[]REJECT
; VIP 等级中适合 AI 的地区（美/日/新/台），自动测速
custom_proxy_group=🤖 VIP-AI池`url-test`VIP.*(美|US|日|JP|新|SG|台|TW)`[]REJECT`https://www.gstatic.com/generate_204`300,,50
; STD 等级中适合 AI 的地区，自动测速
custom_proxy_group=🤖 STD-AI池`url-test`STD.*(美|US|日|JP|新|SG|台|TW)`[]REJECT`https://www.gstatic.com/generate_204`300,,50
; VIP 全部节点，自动测速
custom_proxy_group=🌟 VIP全局`url-test`VIP`[]REJECT`https://www.gstatic.com/generate_204`300,,50
; STD 全部节点，自动测速
custom_proxy_group=🌍 STD全局`url-test`STD`[]REJECT`https://www.gstatic.com/generate_204`300,,50
; LOW 低优先级节点，作为最后兜底
custom_proxy_group=♻️ LOW兜底`url-test`LOW`[]REJECT`https://www.gstatic.com/generate_204`300,,50


; ====== 第二层：顶层 fallback 业务组 ======

; AI服务：IP 质量优先 → VPS(自建最稳) → VIP美日新台 → STD美日新台 → VIP全局
custom_proxy_group=🤖 AI服务`fallback`[]🏠 我的VPS`[]🤖 VIP-AI池`[]🤖 STD-AI池`[]🌟 VIP全局`https://www.gstatic.com/generate_204`300,,50
; 影音搜索/大流量：成本优先 → STD(便宜) → VIP → VPS(贵) → LOW(兜底)
custom_proxy_group=📺 影音搜索`fallback`[]🌍 STD全局`[]🌟 VIP全局`[]🏠 我的VPS`[]♻️ LOW兜底`https://www.gstatic.com/generate_204`300,,50


; ====== 第三层：功能分组 ======
; 下方每个功能分组都是 select 类型，首选项排在最前面
; 你可以随时在 OpenClash 面板中手动切换

; --- 通用功能 ---
; 手动选择：GFW 兜底规则和代理补丁的默认出口，可手动选择任意节点/分组
